train_config:
  batch_size: 8
  epochs: 22000
  lr: 0.000001
  device: cuda
  # ckpt_dir: ./checkpoints/render_siamese_normal/last
  # ckpt_dir: ./checkpoints/render_siamese/base_0

  summon_ckpt: true
  accumulation_steps: 2
  save_period: 1000
  max_saves: 5

eval_config:
  lr: 0.000001
  eval_period: 6
  batch_size: 2

log_config:
  log_dir: render_siamese_color
  log_period_loss: 20
  log_period_visual: 500
