unet_config:
  target: model.legacy.diffusionmodules.openaimodel.UNetModel
  params:
    image_size: 32
    in_channels: 8
    out_channels: 4
    model_channels: 256
    attention_resolutions:
    #note: this isn\t actually the resolution but
    # the downsampling factor, i.e. this corresnponds to
    # attention on spatial resolution 8,16,32, as the
    # spatial reolution of the latents is 32 for f8
    - 4
    - 2
    - 1
    num_res_blocks: 2
    channel_mult:
    - 1
    - 2
    - 4
    num_head_channels: 32
    use_spatial_transformer: true
    transformer_depth: 1
    context_dim: 1024
  
first_stage_config:
  target: model.legacy.autoencoder.VQModelInterface
  params:
    embed_dim: 4
    n_embed: 16384
    ckpt_path: ./pretrained/legacy/last.ckpt
    ddconfig:
      double_z: false
      z_channels: 4
      resolution: 256
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult:
      - 1
      - 2
      - 2
      - 4
      num_res_blocks: 2
      attn_resolutions:
      - 32
      dropout: 0.0
    lossconfig:
      target: torch.nn.Identity

cond_stage_config:
  target: model.legacy.encoders.PartialSAEncoder
  params:
    context_dim: 256
    multi_channel: true
    key: c_crossattn
