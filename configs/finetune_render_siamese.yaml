train_config:
  batch_size: 32
  epochs: 22000
  lr: 0.000001
  device: cuda
  # ckpt_dir: ./checkpoints/render_siamese_normal/last
  # ckpt_dir: ./checkpoints/render_siamese_all/base_1
  ckpt_dir: ./checkpoints/render_siamese_light/base_2

  summon_ckpt: true
  accumulation_steps: 1
  save_period: 1000
  max_saves: 5

eval_config:
  lr: 0.000001
  eval_period: 6
  batch_size: 10

log_config:
  log_dir: render_siamese_light
  log_period_loss: 20
  log_period_visual: 500

test_config:
  batch_size: 4
  num_samples: 8

  log_period_visual: 500
  log_period_loss: 100
